name: Supply Chain Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: npm audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [timps-code, timps-mcp, timps-vscode, sandeep-ai]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.package }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.package }}
        # Report high/critical only; informational advisories should not block CI
        run: npm audit --audit-level=high

  osv-scan:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSV Scanner
        uses: google/osv-scanner-action@v2
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./
