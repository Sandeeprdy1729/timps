name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sandeep-ai/package-lock.json
      - run: cd sandeep-ai && npm ci
      - run: cd sandeep-ai && npx tsc --noEmit
        name: Type check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sandeep-ai/package-lock.json
      - run: cd sandeep-ai && npm ci
      - run: cd sandeep-ai && npx tsc --noEmit --strict
        name: Strict type check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sandeep-ai/package-lock.json
      - run: cd sandeep-ai && npm ci
      - run: cd sandeep-ai && npm run build
        name: Compile TypeScript
      - name: Verify dist output
        run: |
          test -f sandeep-ai/dist/main.js || (echo "Build failed - dist/main.js missing" && exit 1)
          test -f sandeep-ai/dist/core/agent.js || (echo "Build failed - agent missing" && exit 1)
          test -f sandeep-ai/dist/tools/allTools.js || (echo "Build failed - allTools missing" && exit 1)
          echo "✓ Build output verified"