name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── timps-code ────────────────────────────────────────────────────────────
  timps-code:
    name: timps-code (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    defaults:
      run:
        working-directory: timps-code

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: timps-code/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test --if-present

  # ── timps-mcp ─────────────────────────────────────────────────────────────
  timps-mcp:
    name: timps-mcp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: timps-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: timps-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build --if-present

  # ── timps-vscode ──────────────────────────────────────────────────────────
  timps-vscode:
    name: timps-vscode
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: timps-vscode

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: timps-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Compile extension
        run: npm run compile --if-present

  # ── sandeep-ai ────────────────────────────────────────────────────────────
  sandeep-ai:
    name: sandeep-ai
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandeep-ai

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sandeep-ai/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/main.js || (echo "Build failed — dist/main.js missing" && exit 1)
          echo "✓ Build output verified"
