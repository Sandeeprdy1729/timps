name: Test & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - event-bus
          - connection-manager
          - event-bus
          - connection-manager
          - timps-desktop
          - plugin-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --workspace=packages/${{ matrix.package }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage

  coverage-report:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4

      - name: Generate combined coverage report
        continue-on-error: true
        run: |
          echo "Coverage reports: "
          ls -la coverage-*/ 2>/dev/null || echo "No coverage artifacts found"

      - name: Check coverage thresholds
        run: |
          for dir in coverage-*/; do
            if [ -f "$dir/coverage-final.json" ]; then
              echo "✓ Coverage report found in $dir"
              # Enforce minimum 60% coverage thresholds
              LINES=$(jq '.total.lines.pct // 0' "$dir/coverage-final.json")
              FUNCS=$(jq '.total.functions.pct // 0' "$dir/coverage-final.json")
              BRANCHES=$(jq '.total.branches.pct // 0' "$dir/coverage-final.json")
              echo "  Lines: ${LINES}% | Functions: ${FUNCS}% | Branches: ${BRANCHES}%"
              FAIL=false
              if (( $(echo "$LINES < 60" | bc -l) )); then echo "  ❌ Lines below 60% threshold"; FAIL=true; fi
              if (( $(echo "$FUNCS < 60" | bc -l) )); then echo "  ❌ Functions below 60% threshold"; FAIL=true; fi
              if (( $(echo "$BRANCHES < 60" | bc -l) )); then echo "  ❌ Branches below 60% threshold"; FAIL=true; fi
              if [ "$FAIL" = true ]; then exit 1; fi
            fi
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx
        continue-on-error: true

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run benchmarks
        run: |
          echo "Running benchmarks..."
          # Run npm benchmarks
          npm run benchmark --if-present 2>/dev/null || echo "No benchmark script"

      - name: Store benchmark data
        if: hashFiles('./benchmark-results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: ./benchmark-results.json