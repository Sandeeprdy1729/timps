name: Publish to npm

on:
  push:
    tags:
      - 'v*'             # publishes timps (server)      e.g. v2.0.3
      - 'code-v*'        # publishes timps-code (CLI)    e.g. code-v2.0.1
      - 'mcp-v*'         # publishes timps-mcp           e.g. mcp-v1.0.1

jobs:
  # ── timps (server) ──────────────────────────────────────────────────────────
  publish-timps:
    name: Publish timps (server)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: sandeep-ai/package-lock.json

      - name: Install dependencies
        run: cd sandeep-ai && npm ci

      - name: Build
        run: cd sandeep-ai && npm run build

      - name: Verify build
        run: test -f sandeep-ai/dist/main.js

      - name: Publish to npm
        run: cd sandeep-ai && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## TIMPS ${{ github.ref_name }}

            Install or update:
            ```bash
            npm install -g timps
            ```

            See the [full changelog](https://github.com/Sandeeprdy1729/timps/releases) for what's new.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── timps-code (CLI) ────────────────────────────────────────────────────────
  publish-timps-code:
    name: Publish timps-code (CLI)
    if: startsWith(github.ref, 'refs/tags/code-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: timps-code/package-lock.json

      - name: Install dependencies
        run: cd timps-code && npm ci

      - name: Build
        run: cd timps-code && npm run build

      - name: Verify build
        run: test -f timps-code/dist/bin/timps.js

      - name: Publish to npm
        run: cd timps-code && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: timps-code ${{ github.ref_name }}
          body: |
            ## timps-code ${{ github.ref_name }}

            Install or update:
            ```bash
            npm install -g timps-code
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── timps-mcp ───────────────────────────────────────────────────────────────
  publish-timps-mcp:
    name: Publish timps-mcp
    if: startsWith(github.ref, 'refs/tags/mcp-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: timps-mcp/package-lock.json

      - name: Install dependencies
        run: cd timps-mcp && npm ci

      - name: Build
        run: cd timps-mcp && npm run build

      - name: Verify build
        run: test -f timps-mcp/dist/index.js

      - name: Publish to npm
        run: cd timps-mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: timps-mcp ${{ github.ref_name }}
          body: |
            ## timps-mcp ${{ github.ref_name }}

            Install or update:
            ```bash
            npm install -g timps-mcp
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}