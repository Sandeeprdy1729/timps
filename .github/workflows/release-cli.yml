name: Release CLI Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            asset: timps-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            asset: timps-aarch64-linux
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            asset: timps-x86_64-macos
          - target: aarch64-apple-darwin
            runner: macos-14
            asset: timps-aarch64-macos
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            asset: timps-x86_64-windows.exe

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64 Linux)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --package timps-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --package timps-cli --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.runner != 'windows-2022'
        run: |
          cp target/${{ matrix.target }}/release/timps ${{ matrix.asset }}

      - name: Rename binary (Windows)
        if: matrix.runner == 'windows-2022'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/timps.exe" "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Compute SHA256 checksums
        run: |
          cd dist
          for f in */; do
            sha256sum "${f}"/* >> ../SHA256SUMS.txt
          done
          cat ../SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/**/*
            SHA256SUMS.txt
          generate_release_notes: true
          draft: false
