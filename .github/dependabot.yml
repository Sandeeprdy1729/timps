version: 2
updates:
  # timps-code — one grouped PR per month instead of many weekly PRs
  - package-ecosystem: "npm"
    directory: "/timps-code"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      timps-code-deps:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "timps-code"

  # timps-mcp
  - package-ecosystem: "npm"
    directory: "/timps-mcp"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      timps-mcp-deps:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "timps-mcp"

  # timps-vscode
  - package-ecosystem: "npm"
    directory: "/timps-vscode"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      timps-vscode-deps:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "timps-vscode"

  # sandeep-ai
  - package-ecosystem: "npm"
    directory: "/sandeep-ai"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      sandeep-ai-deps:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "sandeep-ai"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      actions-deps:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "github-actions"
