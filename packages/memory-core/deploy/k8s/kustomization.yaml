apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - timps-memory.yaml

commonLabels:
  environment: production
  managed-by: timps

configMapGenerator:
  - name: timps-config
    literals:
      - memory_port=4100
      - memory_grpc_port=4101
      - qdrant_url=http://qdrant:6333
