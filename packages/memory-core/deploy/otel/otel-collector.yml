receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  attributes:
    actions:
      - key: timps.version
        action: upsert
        value: "2.5.0"
      - key: telemetry.sdk.name
        action: upsert
        value: "timps-memory-core"

exporters:
  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: timps
    const_labels:
      service: timps-memory
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
