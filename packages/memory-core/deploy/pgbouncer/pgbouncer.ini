; ── PgBouncer config for TIMPS MemoryServer ──
; Transaction-mode pooling for read/write splitting.
;
; Install: brew install pgbouncer (macOS) or apt install pgbouncer (Linux)
; Run:     pgbouncer pgbouncer.ini
;
; Auto-scaling: PgBouncer sits between MemoryServers and Postgres.
; With 50 MemoryServers each opening 20 connections, PgBouncer
; maintains only ~50 actual Postgres connections.

[databases]
timps_memory = host=localhost port=5432 dbname=timps_memory

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = ./userlist.txt

; Transaction-level pooling: connections released after each transaction.
; Best for MemoryServer workloads where each request is a single transaction.
pool_mode = transaction

; Max client connections (total across all MemoryServers)
max_client_conn = 200

; Default pool size per database/user pair
default_pool_size = 50

; Min pool size (keep this many connections warm)
min_pool_size = 10

; Max number of connections per database/user pair
max_db_connections = 100

; Pool size for idle connections waiting to be reused
reserve_pool_size = 10
reserve_pool_timeout = 5.0

; Timeout for server connections (seconds)
server_idle_timeout = 600
server_lifetime = 3600
query_timeout = 30

; Timeout for client connections waiting in queue (seconds)
client_login_timeout = 60

; Log connections/disconnections
log_connections = 1
log_disconnections = 1

; Application name for Postgres
application_name_add_host = 1

; Allowed TLS/SSL modes
client_tls_sslmode = disable
server_tls_sslmode = disable

; Stats reporting
stats_period = 60
