  <!-- Eyes -->
  <rect x="9" y="8" width="4" height="4" fill="#E8E0B0"/>
  <rect x="10" y="9" width="2" height="2" fill="#2D5A4F"/>
  <rect x="19" y="8" width="4" height="4" fill="#E8E0B0"/>
  <rect x="20" y="9" width="2" height="2" fill="#2D5A4F"/>
