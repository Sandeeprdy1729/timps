[package]
name = "memory-core-rs"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi        = { version = "2", features = ["napi8"] }
napi-derive = "2"
sha2        = "0.10"
hex         = "0.4"
serde_json  = "1"

[build-dependencies]
napi-build = "2"

[profile.release]
lto           = true
codegen-units = 1
opt-level     = 3

[dev-dependencies]
tempfile = "3"
