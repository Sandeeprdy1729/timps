services:
  - type: web
    name: timps-api
    runtime: node
    plan: free
    buildCommand: cd sandeep-ai && npm install && npm run build
    startCommand: cd sandeep-ai && node dist/main.js server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # --- LLM (Gemini free tier — no cost, no expiry) ---
      - key: DEFAULT_MODEL_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_DEFAULT_MODEL
        value: gemini-2.0-flash
      # --- Embeddings (Gemini embedding-001 — free forever, 1500 RPM) ---
      - key: EMBEDDINGS_PROVIDER
        value: gemini
      - key: EMBEDDINGS_MODEL
        value: embedding-001
      - key: EMBEDDINGS_DIMENSION
        value: 768
      # --- PostgreSQL (Neon.tech — free forever, 0.5 GB) ---
      - key: DATABASE_URL
        sync: false
      # --- Vector DB (Qdrant Cloud — free forever, 1 GB) ---
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false