version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: timps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-sandeep_ai}
    ports:
      - '5432:5432'
    volumes:
      - timps_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: timps-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - timps_qdrant:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:6333/healthz || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  timps:
    build:
      context: ./sandeep-ai
      dockerfile: Dockerfile
    container_name: timps-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sandeep_ai
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      QDRANT_URL: http://qdrant:6333
      DEFAULT_MODEL_PROVIDER: ${DEFAULT_MODEL_PROVIDER:-ollama}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-anthropic/claude-3.5-haiku}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.1:8b}
      EMBEDDINGS_PROVIDER: ollama
      EMBEDDINGS_MODEL: nomic-embed-text
      EMBEDDINGS_DIMENSION: 768
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  timps_postgres:
  timps_qdrant: